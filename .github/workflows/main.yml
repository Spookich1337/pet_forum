name: pet CI/CD

on: 
  push:
    branches: ["main"]
  pullrequest:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@latest

      - name: Set up python
        uses: actions/setup-python
        with:
          python-version: "3.12"

      - name: Load dependency
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v
